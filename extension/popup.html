<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>uiFix</title>

  <link rel="stylesheet" href="styles.css">

  <style>
    html, body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(90deg, #280861, #000000);
      color: #f1f5f9;
      width: 360px;
      margin: 0;
      padding: 0;
    }

    .hidden { display: none; }

    .chat-container {
      margin-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 12px;
    }

    .chat-messages {
      max-height: 150px;
      overflow-y: auto;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .chat-input-row {
      display: flex;
      gap: 6px;
    }

    .chat-input-row input {
      flex: 1;
      padding: 6px;
      font-size: 12px;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    .chat-input-row button {
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 6px;
      border: none;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    .turn-counter {
      font-size: 10px;
      opacity: 0.6;
      margin-top: 4px;
      text-align: right;
    }
  </style>
</head>

<body class="app">

  <!-- HEADER -->
  <div class="header header-bar">
    <div class="header-left">
      <img src="icons/icon48.png" width="26" height="26" class="logo">
      <div>
        <div class="app-title">uiFix</div>
        <div class="app-subtitle">AI UI Debugger</div>
      </div>
    </div>
    <span class="version-pill">v1.0</span>
  </div>

  <!-- BODY -->
  <div id="results-container">

    <!-- WELCOME STATE -->
    <div id="welcome-state">
      <div class="hero">
        <div class="hero-icon">
          <img src="icons/icon48.png" width="34">
        </div>

        <h2 class="hero-title">Instant UI Audit</h2>

        <p class="hero-desc">
          VLM + DOM analysis powered by AI.<br>
          Catches what the human eye misses.
        </p>
      </div>
    </div>

    <!-- LOADING STATE -->
    <div id="loading-state" class="hidden">
      <div class="spinner"></div>
      <div class="loading-text">
        <p id="loading-text">Initializing...</p>
        <p class="muted">This takes 12-15 seconds</p>
      </div>
    </div>

    <!-- RESULTS STATE -->
    <div id="results-state" class="hidden">

      <div class="results-header">
        <span class="results-label">Findings</span>
        <span id="issue-count" class="badge badge-low">0</span>
      </div>

      <div id="issues-list"></div>

      <!-- CHAT SECTION (hidden until audit completes) -->
      <div id="chat-container" class="chat-container hidden">

        <div id="chat-messages" class="chat-messages"></div>

        <div class="chat-input-row">
          <input id="chat-input" placeholder="Ask about this audit..." />
          <button id="chat-send">Send</button>
        </div>

        <div class="turn-counter">
          Turns remaining: <span id="chat-remaining">6</span>
        </div>

      </div>

    </div>

    <!-- ERROR STATE -->
    <div id="error-state" class="hidden">
      <p class="error-title">Audit Failed</p>
      <p id="error-text" class="muted">Check console</p>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    <button id="audit-btn" class="btn full-btn">
      <span id="btn-text">Run Page Audit</span>
    </button>
  </div>

  <script src="popup.js"></script>
</body>

</html>
